name: release

# Build static Linux binaries and publish a GitHub release whenever a version
# tag (vX.Y.Z) is pushed. The self-update command in `mailadmin` consumes the
# assets produced here (mailadmin-linux-<arch> + SHA256SUMS).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build linux binaries
        env:
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X mailadmin/internal/cli.Version=${VERSION}" \
              -o "dist/mailadmin-linux-${arch}" ./cmd/mailadmin
          done
          ( cd dist && sha256sum mailadmin-linux-* > SHA256SUMS )
          ls -l dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
